name: Cell DRC

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  drc:
    name: DRC (${{ matrix.pdk }})
    runs-on: ubuntu-22.04

    # iic-osic-tools ships klayout, magic, netgen, and the sky130A / gf180mcuD
    # PDKs pre-installed under /foss/pdks. The image is Ubuntu 24.04 with only
    # Python 3.12, but glayout pins gdsfactory<=7.7.0 / numpy<=1.24, so we
    # install Python 3.10 from deadsnakes and run glayout in a venv.
    #
    # See https://github.com/iic-jku/iic-osic-tools.
    container:
      image: hpretl/iic-osic-tools:latest
      options: --user root
      # The image's entrypoint launches a UI manager; bypass it.
      env:
        PDK_ROOT: /foss/pdks
        DEBIAN_FRONTEND: noninteractive
        PYTHONUNBUFFERED: "1"
        # The image sets PYTHONPATH to its 3.12 site-packages, which breaks
        # python3.10 if inherited.
        PYTHONPATH: ""
        # GitHub Actions overrides the image's ENTRYPOINT with `tail -f`, so
        # the iic-osic-tools entrypoint that normally enriches PATH with
        # /foss/tools/{bin,klayout,...} never runs. Set it explicitly here
        # so klayout/magic/etc. are on PATH for every step.
        PATH: /foss/tools/bin:/foss/tools/sak:/foss/tools/kactus2:/foss/tools/klayout:/foss/tools/osic-multitool:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    strategy:
      fail-fast: false
      matrix:
        pdk: [sky130, gf180]

    # The iic-osic-tools image's default container shell is dash (`sh`), so
    # `set -o pipefail` blows up. Force bash for every `run:` step.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.10 (deadsnakes)
        run: |
          set -euxo pipefail
          # Launchpad PPAs (deadsnakes + the mozillateam PPA baked into the
          # image) intermittently time out from GitHub-hosted runners. Naive
          # retries on apt-get update don't help: apt exits 0 even when an
          # individual repo fails to fetch (it only emits `W: Failed to fetch`).
          # So:
          #   1. Tell apt itself to retry each fetch with a short timeout.
          #   2. After adding the deadsnakes PPA, poll apt-cache for the target
          #      package and re-run update until the index actually lands.
          APT_OPTS='-o Acquire::Retries=10 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30'
          apt-get $APT_OPTS update -qq || true
          apt-get $APT_OPTS install -y --no-install-recommends \
            software-properties-common ca-certificates gnupg curl
          add-apt-repository -y ppa:deadsnakes/ppa
          for i in 1 2 3 4 5 6; do
            apt-get $APT_OPTS update -qq || true
            if apt-cache show python3.10-venv >/dev/null 2>&1; then
              break
            fi
            echo "deadsnakes index not yet available (attempt $i); retrying..."
            sleep $((i*15))
          done
          apt-cache show python3.10-venv >/dev/null
          apt-get $APT_OPTS install -y --no-install-recommends python3.10 python3.10-venv

      - name: Show tool versions
        run: |
          set -euxo pipefail
          klayout -v
          python3.10 --version
          ls "$PDK_ROOT"

      - name: Cache python venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.venv
          # Bust the cache when setup.py changes (deps) or the bundled DRC
          # decks change (paths embedded in glayout's editable install).
          key: drc-venv-py310-${{ runner.os }}-${{ hashFiles('setup.py', 'src/glayout/**/*.py') }}-v1
          restore-keys: |
            drc-venv-py310-${{ runner.os }}-

      - name: Create venv and install glayout (cache miss)
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          rm -rf "$GITHUB_WORKSPACE/.venv"
          python3.10 -m venv "$GITHUB_WORKSPACE/.venv"
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          python -m pip install --upgrade pip wheel
          python -m pip install -e .

      - name: Refresh editable install (cache hit)
        if: steps.cache-venv.outputs.cache-hit == 'true'
        run: |
          set -euxo pipefail
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          # Editable install metadata may have stale paths after restore;
          # re-install without redownloading deps.
          python -m pip install --no-deps -e .

      - name: Run cell DRC
        run: |
          set -euxo pipefail
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          python tests/drc/run_cell_drc.py \
            --pdk ${{ matrix.pdk }} \
            --out-dir drc_results/${{ matrix.pdk }}

      - name: Upload DRC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drc-${{ matrix.pdk }}
          path: drc_results/${{ matrix.pdk }}

      - name: Publish JUnit summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: drc_results/${{ matrix.pdk }}/junit.xml
          check_name: DRC report (${{ matrix.pdk }})
          require_tests: true
